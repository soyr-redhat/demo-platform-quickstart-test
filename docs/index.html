<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prelude OpenShift AI Quickstarts</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Comprehensive guides for getting started with AI/ML workloads on Red Hat OpenShift AI">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
</head>
<body>

  <div id="app"></div>

  <script>
    window.$docsify = {
      name: (
        '<span style="color: #CC0000; font-weight: bold; font-size: 1.2em;">Prelude</span><br>'
        + '<span style="font-size: 0.9em;">OpenShift AI Quickstarts</span>'
      ),
      repo: 'https://github.com/soyr-redhat/demo-platform-quickstart-test',
      homepage: 'quickstart-1-chat-llm.md',
      loadSidebar: true,
      subMaxLevel: 3,
      sidebarDisplayLevel: 0,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      copyCode: {
        buttonText : 'Copy',
        errorText  : 'Error',
        successText: 'Copied!'
      },
      tabs: {
        persist    : true,
        sync       : true,
        theme      : 'classic',
        tabComments: true,
        tabHeadings: true
      },
      search: {
        placeholder: 'Search...',
        noData: 'No results found',
        depth: 3
      },
      plugins: [
        function(hook) {
          var footer = [
            '<footer class="footer">',
            '<hr>',
            '<small>',
            '   © <time datetime="2025">2025</time> Red Hat OpenShift AI. All rights reserved.',
            '</small>',
            '</footer>'
          ].join('');
          hook.afterEach(function(html) {
            return html + footer;
          });
        }
      ]
    }
  </script>

  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="//unpkg.com/prismjs/components/prism-bash.min.js"></script>
  <script src="//unpkg.com/prismjs/components/prism-yaml.min.js"></script>
  <script src="//unpkg.com/prismjs/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>

  <style>
    /* Red Hat Theme */
    :root {
      --base-font-size: 14px;
      --base-font-family: "RedHatText", "Overpass", "Open Sans", Helvetica, Arial, sans-serif;
      --theme-color: #CC0000;
      --content-max-width: 75em;
      --sidebar-width: 22rem;
      --sidebar-background: #000000;
      --sidebar-nav-link-color: #ffffff;
      --sidebar-nav-link-color--hover: #CC0000;
      --sidebar-nav-link-border-color--active: #CC0000;
    }

    /* GitHub Corner - Red Hat Red */
    .github-corner svg {
      fill: #CC0000 !important;
    }

    /* Sidebar Styling */
    .sidebar {
      background-color: #000000;
      color: #ffffff;
    }

    .sidebar a {
      color: #ffffff !important;
    }

    .sidebar a:hover {
      color: #CC0000 !important;
    }

    /* Tip boxes */
    p.tip {
      border-left-color: #CC0000;
      background-color: #fdf7e5;
    }

    p.tip:before {
      content: "💡";
      background-color: #CC0000;
    }

    /* Code blocks */
    pre {
      background-color: #000000 !important;
      border-left: 4px solid #CC0000;
    }

    pre code {
      color: #ffffff;
    }

    /* Headers */
    h1 {
      border-bottom: 3px solid #CC0000;
      padding-bottom: 0.5em;
    }

    h2 {
      border-bottom: 2px solid #d2d2d2;
      padding-bottom: 0.3em;
    }

    h3 {
      color: #CC0000;
    }

    /* Links */
    a {
      color: #CC0000;
    }

    a:hover {
      color: #a30000;
    }

    /* Footer */
    footer {
      display: block;
      text-align: center;
      color: #666;
      margin-top: 3em;
    }

    /* Copy button */
    .docsify-copy-code-button {
      background-color: #CC0000 !important;
      color: white !important;
    }

    .docsify-copy-code-button:hover {
      background-color: #a30000 !important;
    }

    /* Tabs */
    .docsify-tabs__tab--active {
      color: #CC0000 !important;
      border-bottom: 2px solid #CC0000 !important;
    }

    /* Search */
    .search input {
      border: 2px solid #d2d2d2;
    }

    .search input:focus {
      border-color: #CC0000;
    }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 0.3em 0.6em;
      background-color: #000000;
      color: #ffffff;
      border-radius: 4px;
      font-size: 0.85em;
      font-weight: 500;
      margin-right: 0.5em;
    }

    /* Alert boxes */
    .alert {
      padding: 1em 1.5em;
      margin: 1.5em 0;
      border-left: 4px solid;
      border-radius: 4px;
      background-color: #f5f5f5;
    }

    .alert-info {
      border-left-color: #2b9af3;
      background-color: #e7f2fa;
    }

    .alert-warning {
      border-left-color: #f0ab00;
      background-color: #fdf7e5;
    }

    .alert-success {
      border-left-color: #3e8635;
      background-color: #f0f8f0;
    }
  </style>
</body>
</html>
