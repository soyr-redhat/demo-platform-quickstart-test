<div id="asciidoc-content"></div>

<script>
  // Fetch pre-rendered AsciiDoc HTML (built by GitHub Actions)
  fetch('quickstart-1-chat-llm-asciidoc.html')
    .then(response => {
      if (!response.ok) {
        throw new Error('AsciiDoc HTML not found');
      }
      return response.text();
    })
    .then(html => {
      // Extract body content (remove the full HTML wrapper if present)
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const content = doc.body ? doc.body.innerHTML : html;
      document.getElementById('asciidoc-content').innerHTML = content;
    })
    .catch(error => {
      console.error('Error loading AsciiDoc:', error);
      document.getElementById('asciidoc-content').innerHTML =
        '<div class="alert alert-warning"><strong>Error:</strong> AsciiDoc version not yet built. Please wait for GitHub Actions to complete the build.</div>';
    });
</script>
